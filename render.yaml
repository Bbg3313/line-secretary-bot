# Render.com Blueprint - LINE 비서 봇 웹훅 서버
# Dashboard > New > Blueprint > 이 저장소 연결 후 사용하거나, 아래 값으로 수동 생성

services:
  - type: web
    name: line-secretary-bot
    runtime: python
    region: oregon
    plan: free

    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"

    envVars:
      - key: CHANNEL_SECRET
        sync: false
      - key: CHANNEL_ACCESS_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GEMINI_MODEL
        value: models/gemini-2.0-flash
        sync: false
